name: FST Pay CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fstpay
          POSTGRES_USER: fstpay
          POSTGRES_PASSWORD: fstpay_secret
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and Test Backend (Unit Tests)
      run: |
        cd backend
        mvn clean test
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5434/fstpay
        SPRING_DATASOURCE_USERNAME: fstpay
        SPRING_DATASOURCE_PASSWORD: fstpay_secret
        SPRING_REDIS_HOST: localhost
        SPRING_REDIS_PORT: 6380

    - name: Run Backend Integration Tests
      run: |
        cd backend
        mvn test -Dtest="com.fstpay.integration.*" -DfailIfNoTests=false
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5434/fstpay
        SPRING_DATASOURCE_USERNAME: fstpay
        SPRING_DATASOURCE_PASSWORD: fstpay_secret
        SPRING_REDIS_HOST: localhost
        SPRING_REDIS_PORT: 6380

  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Run Frontend Tests
      run: |
        cd frontend
        npm test -- --run

    - name: Build Frontend Application
      run: |
        cd frontend
        npm run build
