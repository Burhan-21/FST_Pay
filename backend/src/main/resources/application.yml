spring:
  application:
    name: fstpay

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/fstpay}
    username: ${SPRING_DATASOURCE_USERNAME:fstpay}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
    open-in-view: false

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6380}
      timeout: 2000ms
      jedis:
        pool:
          max-active: 10
          max-idle: 5

  # Mail
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Application-specific configuration
app:
  admin:
    email: ${ADMIN_EMAIL:#{null}}
    password: ${ADMIN_PASSWORD:#{null}}
    fullName: ${ADMIN_FULLNAME:Administrator}

  auth:
    max-login-attempts: ${MAX_LOGIN_ATTEMPTS:5}
    lockout-duration-minutes: ${LOCKOUT_DURATION_MINUTES:15}
    password-reset-token-expiry-minutes: ${PASSWORD_RESET_EXPIRY_MINUTES:30}
    otp-rate-limit-seconds: ${OTP_RATE_LIMIT_SECONDS:60}

  rate-limit:
    auth-requests: 10
    auth-window-minutes: 1
    ai-requests: 20
    ai-window-minutes: 1
    general-requests: 150
    general-window-minutes: 1
    cache-max-size: 10000
    trust-x-forwarded-for: false
    register-max-per-ip-hour: 5
jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration-ms: 900000       # 15 minutes
  refresh-token-expiration-ms: 604800000   # 7 days

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# reCAPTCHA
google:
  recaptcha:
    secret: ${RECAPTCHA_SECRET_KEY:}

# AI
ai:
  provider: ${AI_PROVIDER:gemini}   # gemini or openai

gemini:
  api-key: ${GEMINI_API_KEY:}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  
# Server
server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

  # HTTPS enforcement (behind reverse proxy, set this in production)
  # servlet:
  #   session:
  #     cookie:
  #       secure: true
  #       http-only: true
  #       same-site: strict

# Logging
logging:
  level:
    com.fstpay: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.springframework: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
