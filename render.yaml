services:
  - type: web
    name: fstpay-backend
    env: docker
    repo: https://github.com/Burhan-21/FST_Pay
    branch: master
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    plan: starter
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://
      - key: SPRING_DATASOURCE_USERNAME
        value: fstpay
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://fst-pay.vercel.app
      - key: LOG_LEVEL
        value: INFO
      - key: ADMIN_EMAIL
        value: admin@fstpay.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
